# Offline Index Construction Configuration
data_dir: "./data/knowledge"
stage1_output_dir: "./data/stage1_output"
stage2_output_dir: "./data/stage2_output"

preprocessing:
  min_content_length: 10
  enable_advanced_cleaning: true

file_source_mapping:
  "faq.md":
    loader_type: "qa"
    source_type: "faq"
  "products.md":
    loader_type: "mark_down"
    source_type: "product_manual"
  "process.md":
    loader_type: "mark_down"
    source_type: "process_guide"
  "regulations.md":
    loader_type: "mark_down"
    source_type: "regulation"
  "terms.md":
    loader_type: "word_expl"
    source_type: "glossary"

metadata_extraction:
  default_confidence_by_source:
    faq: 0.8
    product_manual: 0.9
    process_guide: 0.85
    regulation: 0.95
    glossary: 0.9
  fallback_confidence: 0.7

  product_keywords:
    "住房贷款": ["一手房", "二手房", "公积金", "按揭", "住房贷款", "首套房", "二套房"]
    "消费贷款": ["消费贷款", "装修贷", "教育贷款", "留学贷款", "汽车贷款", "购车", "出国留学"]
    "经营贷款": ["经营贷款", "企业经营", "个体工商户", "供应链", "小微", "小微企业主"]
    "特色贷款": ["气球贷", "随借随还", "存单质押", "保单贷款", "保单质押"]
  topic_keywords:
    "利率": ["利率", "LPR", "加点", "BP", "优惠利率"]
    "额度": ["额度", "最高", "限额", "贷款价值比"]
    "申请条件": ["条件", "要求", "材料", "证明", "年龄", "收入证明", "户口本", "身份证", "营业执照"]
    "还款": ["还款", "月供", "等额本息", "等额本金", "提前还款", "部分还款", "全部结清", "违约金"]
    "逾期": ["逾期", "催收", "征信", "连三累六", "违约", "信用报告", "硬查询", "逾期记录"]
    "监管": ["监管", "银监会", "央行", "办法", "条例", "合规", "反洗钱", "AML", "KYC", "个人信息保护"]
    "术语": ["定义", "指的是", "缩写", "全称"]
    "流程": ["步骤", "操作", "渠道", "面谈", "登记", "申请流程", "审批", "面签", "抵押登记", "放款"]
    "风险": ["风险", "违规", "禁止", "挪用", "处罚", "风险提示"]
    "贷后": ["贷后", "催收", "检查", "风险预警", "展期", "重组"]

chunking:
  min_chunk_length: 30
  separators: ["\n\n", "\n", "。", "？", "！", "，", "；", "：", " ", ""]
  strategies:
    faq:
      method: "no_split"
      min_chunk_length: 5
    product_manual:
      method: "structure_then_recursive"
      structure_delimiter: "### "
      chunk_size: 800
      chunk_overlap: 100
      min_chunk_length: 10
    process_guide:
      method: "recursive"
      chunk_size: 600
      chunk_overlap: 60
      min_chunk_length: 15
    regulation:
      method: "recursive"
      chunk_size: 500
      chunk_overlap: 50
      min_chunk_length: 10
    glossary:
      method: "no_split"
      min_chunk_length: 5
  default:
    method: "recursive"
    chunk_size: 600
    chunk_overlap: 60
    min_chunk_length: 20