chunking:
  min_chunk_length: 30
  separators: ["\n\n", "\n", "。", "？", "！", "，", "；", "：", " ", ""]
  strategies:
    faq:
      method: "no_split"
      min_chunk_length: 30
    product_manual:
      method: "recursive"
      chunk_size: 800
      chunk_overlap: 100
      min_chunk_length: 30
    process_guide:
      method: "recursive"
      chunk_size: 600
      chunk_overlap: 60
      min_chunk_length: 30
    regulation:
      method: "recursive"
      chunk_size: 500
      chunk_overlap: 50
      min_chunk_length: 30
    glossary:
      method: "no_split"
      min_chunk_length: 15
  default:
    method: "recursive"
    chunk_size: 600
    chunk_overlap: 60
    min_chunk_length: 20