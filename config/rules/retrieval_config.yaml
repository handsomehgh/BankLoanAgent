# RAG config file
milvus_uri: "http://192.168.24.128:19530"
sqlite_db_path: "./checkpoints.db"
retrieval_top_k: 5
retrieval_fetch_k: 10
retrieval_min_similarity: 0.3
rag_max_context_length: 3000
insert_batch_size: 50

# ---------- index param -------------
index_params:
  dense:
    metric_type: "COSINE"
    index_type: "HNSW"
    params:
      M: 16
      efConstruction: 200
  sparse:
    metric_type: "BM25"
    index_type: "SPARSE_INVERTED_INDEX"
    params:
      drop_ratio_build: 0.2

# --------------- search param ----------------
search:
  dense_top_k: 20
  text_match_top_k: 20
  sparse_top_k: 20
  term_top_k: 10
  dense_ef: 64
  term_ef: 64
  dense_metric_type: "COSINE"
  bm25_metric_type: "BM25"

# ------------ multi vector param-------------------
multi_vector:
  enable: true
  term_vector: true
  summary_vector: false
  faq_similar_vector: false
  graph_embedding_dim: 0

  summary_config:
    enable_source_filter: true
    enabled_sources:
      - product_manual
      - process_guide
      - regulation
    min_chunk_length: 200
    temperature: 0.1
    max_output_tokens: 80
    fallback_to_original: true

  faq_similar_config:
    num_variants: 3
    temperature: 0.3
    max_output_tokens: 150
    fallback_to_original: true

# ---------- chunk strategy ----------
chunking:
  faq:
    method: "no_split"
    min_chunk_length: 5
  product_manual:
    method: "structure_then_recursive"
    structure_delimiter: "### "
    chunk_size: 800
    chunk_overlap: 100
    min_chunk_length: 10
  process_guide:
    method: "recursive"
    chunk_size: 600
    chunk_overlap: 60
    min_chunk_length: 15
  regulation:
    method: "recursive"
    chunk_size: 500
    chunk_overlap: 50
    min_chunk_length: 10
  glossary:
    method: "no_split"
    min_chunk_length: 5
  default:
    method: "recursive"
    chunk_size: 600
    chunk_overlap: 60
    min_chunk_length: 20

# ------------- rrf fusion --------------
fusion:
  k: 60

# ------------ reranker ----------------
reranker:
  model_name: "cross-encoder/ms-marco-MiniLM-L6-v2"
  top_k: 5
  batch_size: 16

# ------------ context compressor ----------
compressor:
  enabled: true
  max_context_tokens: 1500
  sentences_to_keep: 3
  fallback_to_full: true
  model_name: "cross-encoder/ms-marco-MiniLM-L6-v2"

# -------------- structure query ------------
filter:
  enabled: true
  confidence_threshold: 0.3
  temperature: 0.0

# ------------- query rewrite --------------
rewriter:
  enable_dynamic: true
  override_strategy: null
  num_variants: 3
  temperature: 0.3
  max_tokens: 200
  fallback_to_original: true

# -------------- routing ----------------
retrieval_routing:
  enabled: true
  rule_based:
    strong_keywords:
      - "利率"
      - "额度"
      - "还款计算"
      - "申请条件"
      - "审批流程"
      - "期限"
      - "月供"
      - "提前还款"
      - "逾期"
      - "连三累六"
      - "LPR"
      - "BP"
      - "等额本息"
      - "等额本金"
      - "征信报告"
      - "贷款"
      - "公积金"
      - "抵押"
      - "质押"
    weak_keywords:
      - "产品"
      - "消费"
      - "经营"
      - "住房"
      - "材料"
      - "流程"
      - "政策"
      - "法规"
    stop_patterns:
      - "^你好[！!。.]?$"
      - "^在吗[？?]?$"
      - "^(谢谢|感谢|多谢|辛苦|没事|好的|OK)"
      - "^(我|我最近|最近)心情"
      - "^(我|我最近|最近)很难过"
      - "^(我|我最近|最近)很烦躁"
      - "^(我|我最近|最近)开心"
    ambiguous_threshold: 6
