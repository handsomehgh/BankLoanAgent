# RAG config file
milvus_uri: "http://192.168.24.128:19530"
sqlite_db_path: "./checkpoints.db"
retrieval_top_k: 5
retrieval_fetch_k: 10
retrieval_min_similarity: 0.3
rag_max_context_length: 3000
insert_batch_size: 50

# ---------- index param -------------
index_params:
  dense:
    metric_type: "COSINE"
    index_type: "HNSW"
    params:
      M: 16
      efConstruction: 200
  sparse:
    metric_type: "BM25"
    index_type: "SPARSE_INVERTED_INDEX"
    params:
      drop_ratio_build: 0.2

# --------------- search param ----------------
search:
  dense_top_k: 20
  text_match_top_k: 20
  sparse_top_k: 20
  term_top_k: 10
  dense_ef: 64
  term_ef: 64
  dense_metric_type: "COSINE"
  bm25_metric_type: "BM25"

# ------------ multi vector param-------------------
multi_vector:
  enable: true
  term_vector: true
  summary_vector: false
  faq_similar_vector: false
  graph_embedding_dim: 0

  summary_config:
    enable_source_filter: true
    enabled_sources:
      - product_manual
      - process_guide
      - regulation
    min_chunk_length: 200
    temperature: 0.1
    max_output_tokens: 80
    fallback_to_original: true

  faq_similar_config:
    num_variants: 3
    temperature: 0.3
    max_output_tokens: 150
    fallback_to_original: true

# ------------- rrf fusion --------------
fusion:
  k: 60

# ------------ reranker ----------------
reranker:
  model_name: "cross-encoder/ms-marco-MiniLM-L6-v2"
  top_k: 5
  batch_size: 16

# ------------ context compressor ----------
compressor:
  enabled: true
  max_context_tokens: 1500
  sentences_to_keep: 3
  fallback_to_full: true
  model_name: "cross-encoder/ms-marco-MiniLM-L6-v2"

# -------------- structure query ------------
filter:
  enabled: true
  confidence_threshold: 0.3
  temperature: 0.0

# ------------- query rewrite --------------
rewriter:
  enable_dynamic: true
  override_strategy: null
  num_variants: 3
  temperature: 0.3
  max_tokens: 200
  fallback_to_original: true

# -------------- routing ----------------
retrieval_routing:
  enabled: true
  strategy: "rule_based"
  rule_based:
    strong_keywords:
      # 贷款意向
      - "想贷"
      - "想办"
      - "准备贷"
      - "我能贷多少"
      - "额度多少"
      - "怎么贷"
      - "如何申请"
      # 产品词
      - "经营贷"
      - "消费贷"
      - "信用贷"
      - "抵押贷"
      - "公积金贷"
      - "装修贷"
      - "房贷"
      - "一手房"
      - "二手房"
      # 动作词
      - "结清"
      - "展期"
      - "重组"
      - "借新还旧"
      - "提前还款"
      - "还款计划"
      # 利率、费用
      - "利率"
      - "LPR"
      - "BP"
      - "手续费"
      - "违约金"
      # 文件、材料
      - "收入证明"
      - "银行流水"
      - "征信报告"
      - "房产证"
      - "营业执照"
      - "户口本"
      # 状态、条件
      - "审批"
      - "审核"
      - "条件"
      - "要求"
      - "期限"
      - "月供"
      - "等额本息"
      - "等额本金"
    weak_signals:
      # ---------- 贷款意向 (P0) ----------
      - words: [ "想贷","想借","有没有贷款","能贷吗","借一笔","急需用钱" ]
        score: 2
      - words: [ "咨询一下","问一下","了解一下","打听","想办" ]
        score: 1

      # ---------- 还款相关 (P0) ----------
      - words: [ "还清","结清","提前还","还款计划","月供","供款" ]
        score: 2
      - words: [ "还差","剩下","还剩","欠多少","还欠" ]
        score: 2

      # ---------- 产品/业务类型 ----------
      - words: [ "经营贷","消费贷","信用贷","抵押贷","公积金","装修贷","房贷","一手房","二手房" ]
        score: 2
      - words: [ "购车","买车","旅游","教育基金","医疗费用","留学" ]
        score: 1

      # ---------- 文件/材料 ----------
      - words: [ "收入证明","银行流水","个税","纳税记录","完税","劳动合同","在职证明" ]
        score: 2
      - words: [ "房产证","行驶证","营业执照","征信报告","信用报告","户口本","身份证" ]
        score: 2

      # ---------- 金额/期限 ----------
      - words: [ "额度","限额","最多能贷","能贷多少","最高多少" ]
        score: 2
      - words: [ "几年","期限","多少年","月供多少","每月还多少" ]
        score: 1

      # ---------- 利率/费用 ----------
      - words: [ "利率","LPR","BP","加点","年化","手续费","违约金" ]
        score: 2

      # ---------- 征信/信用 ----------
      - words: [ "征信","信用","逾期","黑名单","失信","有记录","硬查询" ]
        score: 2
      - words: [ "没贷过","第一次","白户","没有征信" ]
        score: 1

      # ---------- 个人信息 ----------
      - words: [ "公司","单位","工作","上班","职业","行业" ]
        score: 1
      - words: [ "收入","工资","打卡","底薪","奖金","税后","月入" ]
        score: 2
      - words: [ "结婚","离婚","单身","已婚","未婚","离异","孩子","父母" ]
        score: 1
      - words: [ "房产","有房","名下有","车子","存款","理财","公积金" ]
        score: 2

      # ---------- 业务往来 ----------
      - words: [ "本行","代发薪","代发工资","已有业务","在本行有","开户","老客户" ]
        score: 1
    stop_patterns:
      - "^你好[！!。.]?$"
      - "^在吗[？?]?$"
      - "^(谢谢|感谢|多谢|辛苦|没事|好的|OK)"
      - "^(我|最近)心情"
      - "^(我|最近)(很难过|烦躁|开心)"
      - "^(结束|再见|拜拜|下次再聊)"
    ambiguous_threshold: 5
    weak_signal_threshold: 4