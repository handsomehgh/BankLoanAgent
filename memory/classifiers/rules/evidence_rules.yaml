# 证据类型规则配置
# 支持热加载，修改后无需重启服务

version: "1.0"

# 快速规则：强信号关键词（命中即直接返回，无需 LLM）
strong_keywords:
  bank_statement:
    - "银行流水"
    - "工资流水"
    - "代发工资"
    - "入账记录"
    - "流水单"
    - "银行对账单"
    - "交易明细"
  credit_report:
    - "征信报告"
    - "信用报告"
    - "人行征信"
    - "个人信用报告"
    - "征信记录"
    - "信用评分"
  tax_document:
    - "税单"
    - "个税"
    - "完税证明"
    - "纳税记录"
    - "个人所得税"
    - "收入纳税明细"

# 证据权威权重（用于冲突解决时比较，数值越大越权威）
evidence_weights:
  credit_report: 100
  tax_document: 90
  bank_statement: 80
  explicit_statement: 50
  inferred: 20