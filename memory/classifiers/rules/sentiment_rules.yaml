# 情感分析规则配置
# 支持热加载，修改后无需重启服务

version: "1.0"

# 快速规则：强情绪关键词（命中即直接返回，无需 LLM）
strong_keywords:
  positive:
    - "谢谢"
    - "满意"
    - "很好"
    - "不错"
    - "感谢"
    - "开心"
    - "挺好"
    - "可以"
    - "行"
    - "好的"
    - "没问题"
    - "点赞"
  anxious:
    - "着急"
    - "担心"
    - "紧张"
    - "怎么办"
    - "急"
    - "赶紧"
    - "快点"
    - "马上"
    - "尽快"
    - "焦虑"
  frustrated:
    - "烦死了"
    - "无语"
    - "坑爹"
    - "骗人"
    - "太差"
    - "失望"
    - "垃圾"
    - "差劲"
    - "糟糕"
    - "气人"
    - "火大"